name: Keep-Alive Cron

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
  ping_database:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the Next.js Keepalive Endpoint
        # Replace the domain inside the curl command once you deploy to production!
        run: |
          curl -i -X GET https://kekeyparcel.com/api/cron/keepalive
